# Conexión a la Base de Datos (Supabase)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
# Nota: Usa 'update' para desarrollo/producción inicial, pero ten cuidado si cambias entidades.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Puerto del Servidor
# Render asigna dinámicamente un puerto mediante la variable PORT. 
# Esto le dice a Spring que use ese puerto, o el 8080 por defecto si estás en local.
server.port=${PORT:8080}